<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍮 푸딩 - 라이선스 발급 및 관리자 </title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f6f8; color: #333; padding: 30px 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; color: #2c3e50; margin-bottom: 8px; }
        .header p { color: #7f8c8d; font-size: 14px; }

        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #34495e; display: flex; align-items: center; justify-content: space-between; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #ff9f43; }

        .btn { padding: 10px 18px; background: #ff9f43; color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e67e22; }
        .btn-secondary { background: #7f8c8d; }
        .btn-secondary:hover { background: #95a5a6; }
        .btn-danger { background: #e74c3c; padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background: #c0392b; }
        .btn-copy { background: #3498db; padding: 6px 12px; font-size: 12px; margin-right: 4px; }
        .btn-copy:hover { background: #2980b9; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: bold; color: #666; }
        tr:hover { background: #fdfdfd; }

        .loading { text-align: center; color: #888; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🍮 푸딩 대리티켓팅 라이선스 관리자</h1>
        <p>클라우드(JSONBin) 연동 기반 유무효 키 발급 및 관리 콘솔</p>
    </div>

    <!-- 1. 신규 유저 등록 카드 -->
    <div class="card">
        <div class="card-title">➕ 신규 사용자 라이선스 발급</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end;">
            <div class="form-group" style="margin: 0;">
                <label>구매자 성함 (또는 아이디)</label>
                <input type="text" id="userName" placeholder="예: 홍길동">
            </div>
            <div class="form-group" style="margin: 0;">
                <label>메모 (구매 경로/연락처 등)</label>
                <input type="text" id="userMemo" placeholder="예: 카카오톡 구매자">
            </div>
            <button class="btn" onclick="registerUser()">라이선스 생성 및 등록</button>
        </div>
    </div>

    <!-- 2. 현재 등록된 사용자 목록 카드 -->
    <div class="card">
        <div class="card-title">
            <span>👥 등록된 구매자 목록 (<span id="userCount">0</span>명)</span>
            <button class="btn btn-secondary" style="font-size: 12px; padding: 6px 12px;" onclick="loadUsers()">🔄 새로고침</button>
        </div>
        
        <div id="loadingText" class="loading">데이터 불러오는 중...</div>
        
        <table id="userTable" style="display: none;">
            <thead>
                <tr>
                    <th>구매자명</th>
                    <th>라이선스 키</th>
                    <th>메모</th>
                    <th>발급일</th>
                    <th>관리 / 복사</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // =========================================================================
    // 🔑 JSONBin 연동 설정
    // =========================================================================
    const JSONBIN_KEY = "$2a$10$DfYID08mgpZiaE1025C5kugvnH/xz68pLrVrq1sR39Kookrz4ITqu"; 
    const BIN_ID      = "6a60c3d0da38895dfe7f75bb";            
    
    // 🔗 고정된 파일 다운로드 주소
    const FIXED_DOWNLOAD_URL = "https://drive.google.com/file/d/1X7UJcNJmyNEr-XGUqugWq7E9AFg_bbjL/view";
    // =========================================================================

    let currentUserList = [];

    function generateKey() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let key = '';
        for (let i = 0; i < 16; i++) {
            if (i > 0 && i % 4 === 0) key += '-';
            key += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return key;
    }

    async function loadUsers() {
        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('userTable').style.display = 'none';

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                method: 'GET',
                headers: { 'X-Master-Key': JSONBIN_KEY }
            });

            if (!res.ok) throw new Error("JSONBin 서버 연결 실패");

            const data = await res.json();
            currentUserList = Array.isArray(data.record) ? data.record : [];
            renderUserTable();
        } catch (err) {
            alert("⚠️ 데이터를 불러오는데 실패했습니다: " + err.message);
        } finally {
            document.getElementById('loadingText').style.display = 'none';
        }
    }

    async function saveUsersToServer(newList) {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_KEY
                },
                body: JSON.stringify(newList)
            });

            if (!res.ok) throw new Error("JSONBin 저장 실패");
            currentUserList = newList;
            renderUserTable();
            return true;
        } catch (err) {
            alert("⚠️ 데이터 저장 실패: " + err.message);
            return false;
        }
    }

    async function registerUser() {
        const nameInput = document.getElementById('userName');
        const memoInput = document.getElementById('userMemo');
        const name = nameInput.value.trim();
        const memo = memoInput.value.trim();

        if (!name) {
            alert("구매자 성함을 입력해주세요.");
            return;
        }

        const newKey = generateKey();
        const newUser = {
            id: Date.now(),
            name: name,
            key: newKey,
            memo: memo,
            date: new Date().toLocaleDateString('ko-KR')
        };

        const updatedList = [newUser, ...currentUserList];
        const success = await saveUsersToServer(updatedList);

        if (success) {
            nameInput.value = '';
            memoInput.value = '';
            alert(`✅ [${name}]님의 라이선스가 성공적으로 발급 및 등록되었습니다.\n발급된 키: ${newKey}`);
        }
    }

    async function deleteUser(userId) {
        if (!confirm("정말 이 라이선스를 삭제하시겠습니까?")) return;
        const updatedList = currentUserList.filter(u => u.id !== userId);
        await saveUsersToServer(updatedList);
    }

    // 📋 유저 정보 복사 함수 (구매자명, 라이선스키, 고정 주소 조합)
    function copyUserInfo(name, key, btnElement) {
        const textToCopy = `구매자명: ${name}\n라이선스키: ${key}\n\n파일 다운주소: ${FIXED_DOWNLOAD_URL}`;

        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = btnElement.textContent;
            btnElement.textContent = '복사완료!';
            btnElement.style.background = '#2ecc71';
            setTimeout(() => {
                btnElement.textContent = originalText;
                btnElement.style.background = '#3498db';
            }, 1500);
        }).catch(err => {
            alert("복사 실패: " + err);
        });
    }

    function renderUserTable() {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';

        document.getElementById('userCount').textContent = currentUserList.length;

        if (currentUserList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">등록된 라이선스가 없습니다.</td></tr>`;
        } else {
            currentUserList.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${user.name}</b></td>
                    <td><code style="background:#eee; padding:2px 6px; border-radius:4px;">${user.key}</code></td>
                    <td>${user.memo || '-'}</td>
                    <td>${user.date}</td>
                    <td>
                        <button class="btn btn-copy" onclick="copyUserInfo('${user.name}', '${user.key}', this)">정보복사</button>
                        <button class="btn btn-danger" onclick="deleteUser(${user.id})">삭제</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('userTable').style.display = 'table';
    }

    loadUsers();
</script>

</body>
</html>
