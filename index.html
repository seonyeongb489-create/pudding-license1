<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🍮 푸딩 라이선스 초간단 관리자 Center</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f6f9; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 950px; }
        .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); margin-bottom: 25px; }
        .form-group { display: flex; gap: 12px; }
        input[type="text"] { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
        button { padding: 14px 24px; background: #ff9f43; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e67e22; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        th { background: #fff8ec; color: #d97706; padding: 12px; text-align: left; border-bottom: 2px solid #f4b860; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .code-badge { font-family: monospace; background: #e6fcf5; color: #0ca678; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .btn-copy { background: #27c93f; padding: 6px 12px; border-radius: 6px; color: white; border:none; cursor:pointer;}
        .btn-delete { background: #ff5f56; padding: 6px 12px; border-radius: 6px; color: white; border:none; cursor:pointer;}
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#d97706; text-align:center;">🍮 푸딩 실시간 라이선스 관리자 센터</h2>

    <div class="card">
        <h3>➕ 신규 구매자 라이선스 발급</h3>
        <div class="form-group">
            <input type="text" id="buyerInput" placeholder="구매자 성함 (동명이인 자동 번호부여)">
            <button onclick="generateLicense()">🚀 라이선스 즉시 발급</button>
        </div>
    </div>

    <div class="card">
        <h3>📜 보유 라이선스 목록</h3>
        <table>
            <thead>
                <tr>
                    <th>구매자</th>
                    <th>발급 일시</th>
                    <th>라이선스 키</th>
                    <th style="text-align:center;">관리</th>
                </tr>
            </thead>
            <tbody id="licenseTableBody">
                <tr><td colspan="4" style="text-align:center;">데이터 로딩 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<textarea id="hiddenArea" style="display:none;"></textarea>

<script>
// ⚠️ 1단계에서 얻은 정보 2개를 아래에 넣어주세요!
const JSONBIN_KEY = "$2a$10$DfYID08mgpZiaE1025C5kugvnH/xz68pLrVrq1sR39Kookrz4ITqu"; // Master Key ($2a$10$...)
const BIN_ID = "6a60c3d0da38895dfe7f75bb";           // Bin ID (65a...)

const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// 데이터 불러오기
async function getDB() {
    try {
        const res = await fetch(API_URL, {
            headers: { "X-Master-Key": JSONBIN_KEY }
        });
        const data = await res.json();
        return Array.isArray(data.record) ? data.record : [];
    } catch(e) {
        return [];
    }
}

// 데이터 저장하기
async function saveDB(data) {
    await fetch(API_URL, {
        method: 'PUT',
        headers: {
            "Content-Type": "application/json",
            "X-Master-Key": JSONBIN_KEY
        },
        body: JSON.stringify(data)
    });
}

// 유저스크립트 템플릿
const SCRIPT_TEMPLATE = `// ==UserScript==
// @name         티켓링크스포츠 푸딩 (실시간 라이선스 검증판)
// @namespace    http://tampermonkey.net
// @version      2.1
// @match        *://*.ticketlink.co.kr/*
// @match        *://facility.ticketlink.co.kr/*
// @grant        GM_xmlhttpRequest
// @run-at       document-end
// ==/UserScript==

(function () {
    'use strict';

    const BIN_ID = "${BIN_ID}";
    const JSONBIN_KEY = "${JSONBIN_KEY}";
    const LICENSE_USER = "__LICENSE_USER__";
    const ACCESS_KEY   = "__ACCESS_KEY__";

    const STORAGE_NAME = 'pudding_user_name_ls';
    const STORAGE_KEY  = 'pudding_user_key_ls';

    function checkLiveLicense(name, key, callback) {
        GM_xmlhttpRequest({
            method: "GET",
            url: "https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest",
            headers: { "X-Master-Key": JSONBIN_KEY },
            onload: function(res) {
                try {
                    const data = JSON.parse(res.responseText);
                    const list = data.record || [];
                    const found = list.find(item => item.name === name && item.key === key);
                    callback(!!found);
                } catch(e) { callback(false); }
            },
            onerror: function() { callback(false); }
        });
    }

    function forceLogout() {
        localStorage.removeItem(STORAGE_NAME);
        localStorage.removeItem(STORAGE_KEY);
        alert("❌ [푸딩] 라이선스가 삭제되어 사용할 수 없습니다.");
        location.reload();
    }

    function init() {
        let savedName = localStorage.getItem(STORAGE_NAME) || '';
        let savedKey  = localStorage.getItem(STORAGE_KEY) || '';

        if (savedName === LICENSE_USER && savedKey === ACCESS_KEY) {
            checkLiveLicense(savedName, savedKey, function(isValid) {
                if (isValid) {
                    alert("✅ 정품 인증 확인 (" + savedName + ")");
                } else {
                    forceLogout();
                }
            });
        } else {
            let inputName = prompt("구매자 성함:");
            let inputKey = prompt("라이선스 키:");

            if (inputName === LICENSE_USER && inputKey === ACCESS_KEY) {
                checkLiveLicense(inputName, inputKey, function(isValid) {
                    if (isValid) {
                        localStorage.setItem(STORAGE_NAME, inputName);
                        localStorage.setItem(STORAGE_KEY, inputKey);
                        alert("✅ 인증 완료!");
                        location.reload();
                    } else {
                        alert("⚠️ 존재하지 않거나 삭제된 라이선스입니다.");
                    }
                });
            } else {
                alert("⚠️ 인증 실패!");
            }
        }
    }

    init();
})();`;

async function render() {
    const db = await getDB();
    const tbody = document.getElementById('licenseTableBody');

    if (db.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">등록된 라이선스가 없습니다.</td></tr>';
        return;
    }

    tbody.innerHTML = db.map((item, idx) => `
        <tr>
            <td><b>${item.name}</b></td>
            <td>${item.date}</td>
            <td><span class="code-badge">${item.key}</span></td>
            <td style="text-align:center;">
                <button class="btn-copy" onclick="copyCode('${item.name}', '${item.key}')">코드복사</button>
                <button class="btn-delete" onclick="deleteUser(${item.id})">삭제</button>
            </td>
        </tr>
    `).join('');
}

async function generateLicense() {
    const input = document.getElementById('buyerInput');
    const rawName = input.value.trim();
    if (!rawName) return alert('이름을 입력하세요');

    const db = await getDB();
    const count = db.filter(i => i.rawName === rawName).length;
    const formattedName = count === 0 ? rawName : `${rawName}${count}`;

    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const p1 = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    const p2 = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    const newKey = `TPH2-${p1}-${p2}`;

    const newItem = {
        id: Date.now(),
        rawName: rawName,
        name: formattedName,
        key: newKey,
        date: new Date().toLocaleString()
    };

    db.unshift(newItem);
    await saveDB(db);
    input.value = '';
    render();
    alert(`✅ [${formattedName}] 발급 완료!`);
}

async function deleteUser(id) {
    if (!confirm('삭제 시 해당 유저는 즉시 프로그램 사용이 차단됩니다. 진행할까요?')) return;
    let db = await getDB();
    db = db.filter(i => i.id !== id);
    await saveDB(db);
    render();
}

function copyCode(name, key) {
    const code = SCRIPT_TEMPLATE.replace('__LICENSE_USER__', name).replace('__ACCESS_KEY__', key);
    const hidden = document.getElementById('hiddenArea');
    hidden.style.display = 'block';
    hidden.value = code;
    hidden.select();
    document.execCommand('copy');
    hidden.style.display = 'none';
    alert(`📋 [${name}] 전용 유저스크립트 복사 완료!`);
}

render();
</script>

</body>
</html>
