<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🍮 푸딩 라이선스 실시간 통합 관리자 Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f6f9; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 950px; }
        .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); margin-bottom: 25px; }
        .form-group { display: flex; gap: 12px; }
        input[type="text"] { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
        button { padding: 14px 24px; background: #ff9f43; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e67e22; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        th { background: #fff8ec; color: #d97706; padding: 12px; text-align: left; border-bottom: 2px solid #f4b860; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .code-badge { font-family: monospace; background: #e6fcf5; color: #0ca678; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .btn-copy { background: #27c93f; padding: 6px 12px; border-radius: 6px; }
        .btn-delete { background: #ff5f56; padding: 6px 12px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#d97706; text-align:center;">🍮 푸딩 실시간 차단 연동 라이선스 센터</h2>

    <div class="card">
        <h3>➕ 신규 구매자 라이선스 발급</h3>
        <div class="form-group">
            <input type="text" id="buyerInput" placeholder="구매자 성함 (동명이인 자동 번호부여)">
            <button onclick="generateLicense()">🚀 라이선스 즉시 발급</button>
        </div>
    </div>

    <div class="card">
        <h3>📜 실시간 라이선스 보유 목록</h3>
        <table>
            <thead>
                <tr>
                    <th>구매자 (동명이인 처리)</th>
                    <th>발급 일시</th>
                    <th>시리얼 라이선스 키</th>
                    <th style="text-align:center;">실시간 관리</th>
                </tr>
            </thead>
            <tbody id="licenseTableBody">
                <tr><td colspan="4" style="text-align:center;">데이터를 불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<textarea id="hiddenArea" style="display:none;"></textarea>

<script>
// ⚠️ 1단계에서 복사한 Supabase 정보를 아래에 넣어주세요!
const SUPABASE_URL = "https://zjjeohmvxuavezmanhul.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqamVvaG12eHVhdmV6bWFuaHVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MTY4MzQsImV4cCI6MjEwMDI5MjgzNH0.xgiOR_fEVuScnM129hYscCUdpt3_88qv8OdSiuz7iw0";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 유저스크립트 템플릿
const SCRIPT_TEMPLATE = `// ==UserScript==
// @name         티켓링크스포츠 푸딩 (실시간 라이선스 검증판)
// @namespace    http://tampermonkey.net
// @version      2.0
// @description  실시간 DB 연동 정품 인증 스니퍼
// @match        *://*.ticketlink.co.kr/*
// @match        *://facility.ticketlink.co.kr/*
// @grant        GM_xmlhttpRequest
// @run-at       document-end
// ==/UserScript==

(function () {
    'use strict';

    const SUPABASE_URL = "${SUPABASE_URL}";
    const SUPABASE_KEY = "${SUPABASE_KEY}";

    const LICENSE_USER = "__LICENSE_USER__";
    const ACCESS_KEY   = "__ACCESS_KEY__";

    const STORAGE_NAME = 'pudding_user_name_ls';
    const STORAGE_KEY  = 'pudding_user_key_ls';

    function checkLiveLicense(name, key, callback) {
        GM_xmlhttpRequest({
            method: "GET",
            url: \`\${SUPABASE_URL}/rest/v1/licenses?name=eq.\${encodeURIComponent(name)}&license_key=eq.\${encodeURIComponent(key)}&select=*\`,
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": "Bearer " + SUPABASE_KEY
            },
            onload: function(res) {
                try {
                    const data = JSON.parse(res.responseText);
                    if (Array.isArray(data) && data.length > 0) {
                        callback(true); // 라이선스 유효
                    } else {
                        callback(false); // DB에서 삭제됨!
                    }
                } catch(e) { callback(false); }
            },
            onerror: function() { callback(false); }
        });
    }

    function forceLogout() {
        localStorage.removeItem(STORAGE_NAME);
        localStorage.removeItem(STORAGE_KEY);
        alert("❌ [푸딩 알림] 라이선스가 만료되었거나 관리자에 의해 삭제되었습니다. 프로그램 사용이 중지됩니다.");
        location.reload();
    }

    function init() {
        if (window.self !== window.top && location.href.includes('facility.ticketlink.co.kr')) return;

        let savedName = localStorage.getItem(STORAGE_NAME) || '';
        let savedKey  = localStorage.getItem(STORAGE_KEY) || '';

        // 로컬에 값이 있는 경우 실시간 DB 체크
        if (savedName === LICENSE_USER && savedKey === ACCESS_KEY) {
            checkLiveLicense(savedName, savedKey, function(isValid) {
                if (isValid) {
                    // 유효하면 엔진 실행 (기존 티켓팅 기능 코드...)
                    alert("✅ 정품 라이선스가 확인되었습니다. (" + savedName + ")");
                } else {
                    forceLogout();
                }
            });
        } else {
            // 미인증 유저 로그인 창 띄우기
            let inputName = prompt("구매자 성함을 입력하세요:");
            let inputKey = prompt("라이선스 키를 입력하세요:");

            if (inputName === LICENSE_USER && inputKey === ACCESS_KEY) {
                checkLiveLicense(inputName, inputKey, function(isValid) {
                    if (isValid) {
                        localStorage.setItem(STORAGE_NAME, inputName);
                        localStorage.setItem(STORAGE_KEY, inputKey);
                        alert("✅ 정품 인증 완료!");
                        location.reload();
                    } else {
                        alert("⚠️ 존재하지 않거나 삭제된 라이선스입니다.");
                    }
                });
            } else {
                alert("⚠️ 인증 정보가 일치하지 않습니다.");
            }
        }
    }

    init();
})();`;

// DB에서 데이터 불러오기
async function loadLicenses() {
    const { data, error } = await supabase.from('licenses').select('*').order('id', { ascending: false });
    if (error) return console.error(error);

    const tbody = document.getElementById('licenseTableBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">발급된 내역이 없습니다.</td></tr>';
        return;
    }

    tbody.innerHTML = data.map(item => `
        <tr>
            <td><b>${item.name}</b></td>
            <td>${new Date(item.created_at).toLocaleString()}</td>
            <td><span class="code-badge">${item.license_key}</span></td>
            <td style="text-align:center;">
                <button class="btn-copy" onclick="copyScript('${item.name}', '${item.license_key}')">코드복사</button>
                <button class="btn-delete" onclick="deleteLicense(${item.id}, '${item.name}')">삭제 (실시간 차단)</button>
            </td>
        </tr>
    `).join('');
}

// 라이선스 신규 발급
async function generateLicense() {
    const rawName = document.getElementById('buyerInput').value.trim();
    if (!rawName) return alert('이름을 입력하세요!');

    // 동명이인 카운트 확인
    const { data } = await supabase.from('licenses').select('name').eq('raw_name', rawName);
    const count = data ? data.length : 0;
    const formattedName = count === 0 ? rawName : `${rawName}${count}`;

    // 키 생성
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const p1 = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    const p2 = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    const newKey = `TPH2-${p1}-${p2}`;

    // DB에 저장
    const { error } = await supabase.from('licenses').insert([
        { raw_name: rawName, name: formattedName, license_key: newKey }
    ]);

    if (error) return alert("오류 발생: " + error.message);

    document.getElementById('buyerInput').value = '';
    loadLicenses();
    alert(`✅ [${formattedName}] 발급 완료!\n키: ${newKey}`);
}

// DB에서 삭제 -> 삭제되는 즉시 유저스크립트 작동 불능
async function deleteLicense(id, name) {
    if (!confirm(`정말 [${name}] 님을 삭제하시겠습니까?\n삭제 즉시 해당 유저의 프로그램 사용이 영구 차단됩니다.`)) return;

    const { error } = await supabase.from('licenses').delete().eq('id', id);
    if (error) alert("삭제 실패: " + error.message);
    else loadLicenses();
}

function copyScript(name, key) {
    const finalCode = SCRIPT_TEMPLATE.replace('__LICENSE_USER__', name).replace('__ACCESS_KEY__', key);
    const hidden = document.getElementById('hiddenArea');
    hidden.style.display = 'block';
    hidden.value = finalCode;
    hidden.select();
    document.execCommand('copy');
    hidden.style.display = 'none';
    alert(`📋 [${name}] 님 전용 코드 복사 완료!`);
}

loadLicenses();
</script>

</body>
</html>
