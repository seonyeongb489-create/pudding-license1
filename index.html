<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍮 푸딩 스니퍼 - 라이선스 발급 및 관리자 콘솔 (원격 로딩 적용판)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f6f8; color: #333; padding: 30px 15px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; color: #2c3e50; margin-bottom: 8px; }
        .header p { color: #7f8c8d; font-size: 14px; }

        .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; color: #34495e; display: flex; align-items: center; justify-content: space-between; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #ff9f43; }

        .btn { padding: 10px 18px; background: #ff9f43; color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e67e22; }
        .btn-secondary { background: #7f8c8d; }
        .btn-secondary:hover { background: #95a5a6; }
        .btn-danger { background: #e74c3c; padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background: #c0392b; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: bold; color: #666; }
        tr:hover { background: #fdfdfd; }

        .code-box { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; margin-top: 15px; display: none; }
        
        .actions { display: flex; gap: 8px; }
        .loading { text-align: center; color: #888; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🍮 푸딩 대리티켓팅 라이선스 관리자</h1>
        <p>클라우드(JSONBin) 연동 기반 유무효 키 발급 및 원격 로더 자동 생성 콘솔</p>
    </div>

    <!-- 1. 신규 유저 등록 카드 -->
    <div class="card">
        <div class="card-title">➕ 신규 사용자 라이선스 발급</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end;">
            <div class="form-group" style="margin: 0;">
                <label>구매자 성함 (또는 아이디)</label>
                <input type="text" id="userName" placeholder="예: 홍길동">
            </div>
            <div class="form-group" style="margin: 0;">
                <label>메모 (구매 경로/연락처 등)</label>
                <input type="text" id="userMemo" placeholder="예: 카카오톡 구매자">
            </div>
            <button class="btn" onclick="registerUser()">라이선스 생성 및 등록</button>
        </div>
    </div>

    <!-- 2. 발급 코드 복사 카드 -->
    <div class="card" id="outputCard" style="display: none;">
        <div class="card-title">
            <span>📋 스크립트 코드 생성 완료 (원격 로더 적용)</span>
            <button class="btn btn-secondary" onclick="copyCode()">코드 전체 복사</button>
        </div>
        <p style="font-size: 13px; color: #666; margin-bottom: 10px;">아래 코드를 복사해서 구매자에게 전달하세요. 메인 로직은 깃허브 원격 서버에서 난독화된 상태로 호출됩니다.</p>
        <div class="code-box" id="codeOutput" style="display: block;"></div>
    </div>

    <!-- 3. 현재 등록된 사용자 목록 카드 -->
    <div class="card">
        <div class="card-title">
            <span>👥 등록된 구매자 목록 (<span id="userCount">0</span>명)</span>
            <button class="btn btn-secondary" style="font-size: 12px; padding: 6px 12px;" onclick="loadUsers()">🔄 새로고침</button>
        </div>
        
        <div id="loadingText" class="loading">데이터 불러오는 중...</div>
        
        <table id="userTable" style="display: none;">
            <thead>
                <tr>
                    <th>구매자명</th>
                    <th>라이선스 키</th>
                    <th>메모</th>
                    <th>발급일</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // =========================================================================
    // 🔑 JSONBin 및 GitHub Raw Gist 연동 설정
    // =========================================================================
    const JSONBIN_KEY = "$2a$10$DfYID08mgpZiaE1025C5kugvnH/xz68pLrVrq1sR39Kookrz4ITqu"; 
    const BIN_ID     = "6a60c3d0da38895dfe7f75bb";           
    const GIST_URL   = "https://gist.githubusercontent.com/seonyeongb489-create/591e69456c5c6aa19b9fd1a5320cfa3d/raw/73b0852fc9852897c9e2f35f0cb95d03eef07b26/gistfile1.txt";
    // =========================================================================

    // 구매자에게 배포되는 탬퍼몽키 스크립트 템플릿 (원격 메인 로드 방식)
    const SCRIPT_TEMPLATE = `// ==UserScript==
// @name         티켓링크스포츠 푸딩 (보안 원격 로더)
// @namespace    http://tampermonkey.net
// @version      2.0
// @description  푸딩 티켓링크 스포츠 유무효 라이선스 인증 및 원격 로더
// @author       Pudding
// @match        *://*.ticketlink.co.kr/*
// @match        *://facility.ticketlink.co.kr/*
// @require      __GIST_URL__
// @grant        none
// @run-at       document-end
// ==/UserScript==

(function () {
    'use strict';

    // =========================================================================
    // 🔑 [구매자 전용 라이선스 정보]
    // =========================================================================
    const LICENSE_USER = "__LICENSE_USER__";
    const ACCESS_KEY   = "__ACCESS_KEY__";
    // =========================================================================

    const STORAGE_NAME = 'pudding_user_name_ls';
    const STORAGE_KEY  = 'pudding_user_key_ls';

    function showLoginModal() {
        if (document.getElementById('pudding-login-overlay')) return;

        const overlay = document.createElement('div');
        overlay.id = 'pudding-login-overlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);display:flex;justify-content:center;align-items:center;z-index:2147483647;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;';
        overlay.innerHTML = \`
            <div style="width:360px; background:#fff; border-radius:16px; box-shadow:0 15px 35px rgba(0,0,0,0.3); overflow:hidden; animation: puddingFade 0.3s ease;">
                <div style="text-align:center; padding:24px; background:#FFD9A0; border-bottom:1px solid #f4b860;">
                    <div style="font-size:20px; font-weight:800; color:#333;">🍮 푸딩대리티켓팅 정품인증</div>
                    <div style="font-size:11px; color:#d97706; margin-top:4px; font-weight:600;">발급받으신 구매자 이름과 키를 입력해 주세요.</div>
                </div>
                <div style="padding:24px; display:flex; flex-direction:column; gap:14px;">
                    <div>
                        <label style="font-size:11px; font-weight:700; color:#666; display:block; margin-bottom:4px;">구매자 성함</label>
                        <input type="text" id="p_input_name" placeholder="예: 홍길동" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:13px; box-sizing:border-box; outline:none;">
                    </div>
                    <div>
                        <label style="font-size:11px; font-weight:700; color:#666; display:block; margin-bottom:4px;">라이선스 키</label>
                        <input type="text" id="p_input_key" placeholder="XXXX-XXXX-XXXX-XXXX" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:13px; box-sizing:border-box; outline:none; font-family:monospace;">
                    </div>
                    <button id="p_btn_submit" style="width:100%; padding:12px; background:#ff9f43; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:14px; cursor:pointer; margin-top:6px; transition:background 0.2s;">정품 인증 및 로그인</button>
                    <div id="p_login_err" style="color:#ef4444; font-size:11px; text-align:center; font-weight:bold; display:none; margin-top:5px;">⚠️ 라이선스 정보가 일치하지 않습니다.</div>
                </div>
            </div>
            <style>
                @keyframes puddingFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
                #p_btn_submit:hover { background: #e67e22; }
            </style>
        \`;
        document.body.appendChild(overlay);

        document.getElementById('p_btn_submit').onclick = function () {
            const inputName = document.getElementById('p_input_name').value.trim();
            const inputKey = document.getElementById('p_input_key').value.trim();
            const errEl = document.getElementById('p_login_err');

            if (LICENSE_USER.includes(inputName) && inputKey === ACCESS_KEY) {
                try {
                    localStorage.setItem(STORAGE_NAME, inputName);
                    localStorage.setItem(STORAGE_KEY, inputKey);
                } catch (e) {}
                overlay.remove();

                if (typeof window.__puddingInitCore === 'function') {
                    window.__puddingInitCore(inputName);
                } else {
                    alert("⚠️ 원격 엔진을 불러오는 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.");
                }
            } else {
                errEl.style.display = 'block';
            }
        };
    }

    function init() {
        if (window.self !== window.top && location.href.includes('facility.ticketlink.co.kr')) {
            return;
        }

        let savedName = '';
        let savedKey = '';
        try {
            savedName = localStorage.getItem(STORAGE_NAME) || '';
            savedKey  = localStorage.getItem(STORAGE_KEY) || '';
        } catch (e) {}

        if (savedName && savedKey && savedKey === ACCESS_KEY && LICENSE_USER.includes(savedName)) {
            if (typeof window.__puddingInitCore === 'function') {
                window.__puddingInitCore(savedName);
            }
        } else {
            showLoginModal();
        }
    }

    init();
})();`;

    let currentUserList = [];

    function generateKey() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let key = '';
        for (let i = 0; i < 16; i++) {
            if (i > 0 && i % 4 === 0) key += '-';
            key += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return key;
    }

    async function loadUsers() {
        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('userTable').style.display = 'none';

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                method: 'GET',
                headers: { 'X-Master-Key': JSONBIN_KEY }
            });

            if (!res.ok) throw new Error("JSONBin 서버 연결 실패");

            const data = await res.json();
            currentUserList = Array.isArray(data.record) ? data.record : [];
            renderUserTable();
        } catch (err) {
            alert("⚠️ 데이터를 불러오는데 실패했습니다: " + err.message);
        } finally {
            document.getElementById('loadingText').style.display = 'none';
        }
    }

    async function saveUsersToServer(newList) {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_KEY
                },
                body: JSON.stringify(newList)
            });

            if (!res.ok) throw new Error("JSONBin 저장 실패");
            currentUserList = newList;
            renderUserTable();
            return true;
        } catch (err) {
            alert("⚠️ 데이터 저장 실패: " + err.message);
            return false;
        }
    }

    async function registerUser() {
        const nameInput = document.getElementById('userName');
        const memoInput = document.getElementById('userMemo');
        const name = nameInput.value.trim();
        const memo = memoInput.value.trim();

        if (!name) {
            alert("구매자 성함을 입력해주세요.");
            return;
        }

        const newKey = generateKey();
        const newUser = {
            id: Date.now(),
            name: name,
            key: newKey,
            memo: memo,
            date: new Date().toLocaleDateString('ko-KR')
        };

        const updatedList = [newUser, ...currentUserList];
        const success = await saveUsersToServer(updatedList);

        if (success) {
            nameInput.value = '';
            memoInput.value = '';
            
            const generatedScript = SCRIPT_TEMPLATE
                .replace('__GIST_URL__', GIST_URL)
                .replace('__LICENSE_USER__', name)
                .replace('__ACCESS_KEY__', newKey);

            document.getElementById('codeOutput').textContent = generatedScript;
            document.getElementById('outputCard').style.display = 'block';
            document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth' });
        }
    }

    async function deleteUser(userId) {
        if (!confirm("정말 이 라이선스를 삭제하시겠습니까?")) return;
        const updatedList = currentUserList.filter(u => u.id !== userId);
        await saveUsersToServer(updatedList);
    }

    function renderUserTable() {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';

        document.getElementById('userCount').textContent = currentUserList.length;

        if (currentUserList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">등록된 라이선스가 없습니다.</td></tr>`;
        } else {
            currentUserList.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${user.name}</b></td>
                    <td><code style="background:#eee; padding:2px 6px; border-radius:4px;">${user.key}</code></td>
                    <td>${user.memo || '-'}</td>
                    <td>${user.date}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteUser(${user.id})">삭제</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('userTable').style.display = 'table';
    }

    function copyCode() {
        const codeText = document.getElementById('codeOutput').textContent;
        navigator.clipboard.writeText(codeText).then(() => {
            alert("📋 스크립트 복사가 완료되었습니다! 구매자에게 전달하세요.");
        }).catch(() => {
            alert("복사에 실패했습니다. 수동으로 복사하세요.");
        });
    }

    loadUsers();
</script>

</body>
</html>
